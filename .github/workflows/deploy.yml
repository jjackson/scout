name: Deploy Scout (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SCOUT_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build -t ${{ vars.SCOUT_ECR_REGISTRY }}/scout/api:$IMAGE_TAG .
          docker push ${{ vars.SCOUT_ECR_REGISTRY }}/scout/api:$IMAGE_TAG

      - name: Build and push Frontend image
        run: |
          docker build -t ${{ vars.SCOUT_ECR_REGISTRY }}/scout/frontend:$IMAGE_TAG \
            -f Dockerfile.frontend \
            --build-arg NGINX_CONF=frontend/nginx.prod-kamal.conf \
            .
          docker push ${{ vars.SCOUT_ECR_REGISTRY }}/scout/frontend:$IMAGE_TAG

      - name: Install Kamal
        run: sudo gem install kamal

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set deploy env vars
        run: |
          echo "SCOUT_EC2_IP=${{ secrets.SCOUT_EC2_IP }}" >> $GITHUB_ENV
          echo "SCOUT_ECR_REGISTRY=${{ vars.SCOUT_ECR_REGISTRY }}" >> $GITHUB_ENV
          echo "SCOUT_REDIS_ENDPOINT=${{ secrets.SCOUT_REDIS_ENDPOINT }}" >> $GITHUB_ENV
          echo "SCOUT_RDS_SECRET_ARN=${{ secrets.SCOUT_RDS_SECRET_ARN }}" >> $GITHUB_ENV
          echo "SCOUT_RDS_ENDPOINT=${{ secrets.SCOUT_RDS_ENDPOINT }}" >> $GITHUB_ENV

      - name: Deploy MCP
        run: kamal deploy -c config/deploy-mcp.yml --version=$IMAGE_TAG

      - name: Deploy API
        run: kamal deploy --version=$IMAGE_TAG

      - name: Deploy Worker
        run: kamal deploy -c config/deploy-worker.yml --version=$IMAGE_TAG

      - name: Deploy Frontend
        run: kamal deploy -c config/deploy-frontend.yml --version=$IMAGE_TAG
