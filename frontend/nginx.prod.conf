server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serves index.html for all non-file, non-proxied routes
    # (handles /scout/, /scout/embed/, /scout/chat, /scout/knowledge, etc.)
    location /scout/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /scout/index.html;
    }

    # Proxy API requests: /scout/api/* → localhost:8000/api/*
    location /scout/api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Critical for streaming responses
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Long-running MCP tool calls (run_materialization on large
        # opportunities) can keep the SSE chat stream silent for minutes
        # while paginated loads run. Default nginx proxy_*_timeout is 60s,
        # which killed a ~70k-row materialization on tenant 765 at exactly
        # 60s of upstream silence (CloudWatch /ecs/labs-jj-scout-web,
        # 2026-04-08 10:30:35 UTC). 600s matches ALB idle_timeout so nginx
        # is no longer the bottleneck. Proper fix is to background
        # materialization via Celery and poll for status — tracked upstream.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Proxy admin: /scout/admin/* → localhost:8000/admin/*
    location /scout/admin/ {
        proxy_pass http://localhost:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Django allauth/OAuth: /scout/accounts/* → localhost:8000/accounts/*
    location /scout/accounts/ {
        proxy_pass http://localhost:8000/accounts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Serve widget.js directly from built frontend (with CORS for cross-origin embeds)
    location = /scout/widget.js {
        alias /usr/share/nginx/html/widget.js;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=300";
    }

    # Health check (ALB can use /scout/health/)
    location /scout/health/ {
        proxy_pass http://localhost:8000/health/;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
